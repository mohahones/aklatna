<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>أكلاتنا</title>
  <script type="text/javascript">
    // سكريبت لتخزين المسار المفقود وعمل تحويل فوري لصفحة index.html
    var segmentCount = 1; // يمثل مجلد /aklatna/
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.split('/').slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
      l.search + l.hash
    );
  </script>
</head>
<body>
</body>
</html>
