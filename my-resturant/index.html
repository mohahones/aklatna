<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/my-logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aklatna</title>
  <script type="text/javascript">
    // سكريبت ذكي يستقبل المسار المحفوظ من ملف 404 ويعيد توجيه React Router إليه
    (function () {
      var redirect = window.sessionStorage.getItem('gh-pages-redirect');
      if (redirect) {
        window.sessionStorage.removeItem('gh-pages-redirect');
        window.history.replaceState(null, null, redirect);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
